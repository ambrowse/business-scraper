<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFinder Pro - Business Prospecting Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Search Card -->
            <div class="sidebar-card">
                <h2>🔍 Search</h2>
                <div class="input-group">
                    <label>Business Type</label>
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="e.g., Plumbing, Dentist, Coffee Shop"
                    >
                </div>
                <div class="input-group">
                    <label>Location</label>
                    <input 
                        type="text" 
                        id="locationInput" 
                        placeholder="e.g., New York, NY"
                    >
                </div>
                <button class="btn btn-primary" onclick="searchBusinesses()">
                    Search Businesses
                </button>
            </div>

            <!-- Stats Card -->
            <div class="sidebar-card">
                <h2>📊 Stats</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px;">
                    <div style="text-align: center;">
                        <div style="font-size: 2em; font-weight: bold; color: #667eea;" id="totalCount">0</div>
                        <div style="font-size: 0.9em; color: #999;">Total Found</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 2em; font-weight: bold; color: #10b981;" id="contactedCount">0</div>
                        <div style="font-size: 0.9em; color: #999;">Contacted</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Map -->
        <div id="map"></div>

        <!-- Business Results -->
        <div id="businessResults" class="business-results"></div>
    </div>

    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCmqm0mhA4wWwfxigPsVUf-SceZ1KufPu4&libraries=places"></script>
    
    <!-- App Script -->
    <script src="app.js"></script>

    <style>
        .business-results {
            grid-column: 3;
        }

        @media (max-width: 1400px) {
            .business-results {
                grid-column: 1 / -1;
            }
        }
    </style>
</body>
</html>
