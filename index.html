<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Prospector - Find Local Businesses Without Websites</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Business Prospector</h1>
            <p>Find local businesses without websites using Google Maps</p>
        </header>

        <div class="search-section">
            <div class="search-form">
                <div class="form-group">
                    <label for="city">City:</label>
                    <input type="text" id="city" placeholder="e.g., New York" required>
                </div>
                <div class="form-group">
                    <label for="state">State:</label>
                    <input type="text" id="state" placeholder="e.g., NY" required>
                </div>
                <div class="form-group">
                    <label for="category">Business Category:</label>
                    <input type="text" id="category" placeholder="e.g., Plumber, Restaurant" required>
                </div>
                <button id="searchBtn" class="btn-primary">🔍 Search</button>
            </div>

            <div id="loadingSpinner" class="spinner">
                <div class="spin"></div>
                <p>Searching for businesses...</p>
            </div>
        </div>

        <div class="stats-section">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Total Found</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="contactedCount">0</div>
                <div class="stat-label">Contacted</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="notContactedCount">0</div>
                <div class="stat-label">Not Contacted</div>
            </div>
        </div>

        <div class="controls-section">
            <div class="filter-controls">
                <select id="filterStatus" class="filter-select">
                    <option value="all">All Businesses</option>
                    <option value="contacted">Contacted Only</option>
                    <option value="not-contacted">Not Contacted Only</option>
                </select>

                <select id="sortBy" class="filter-select">
                    <option value="rating">Sort by Rating (Highest)</option>
                    <option value="name">Sort by Name (A-Z)</option>
                </select>
            </div>

            <div class="control-buttons">
                <button id="exportBtn" class="btn-secondary">📥 Export to CSV</button>
                <button id="clearDataBtn" class="btn-secondary">🗑️ Clear All Data</button>
            </div>
        </div>

        <div id="businessesContainer" class="businesses-container">
            <div class="empty-message">
                <div class="empty-message-icon">🔍</div>
                <p>Search for businesses to get started!</p>
            </div>
        </div>

        <div class="load-more-section">
            <div class="load-more-info">
                Results loaded. Click below to load more.
            </div>
            <button class="btn-load-more">Load 100 More Results</button>
        </div>
    </div>

    <!-- Modal for notes -->
    <div id="notesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add/Edit Notes</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="notesText" placeholder="Add your notes here..."></textarea>
            </div>
            <div class="modal-footer">
                <button id="saveNotesBtn" class="btn-primary">💾 Save Notes</button>
                <button id="cancelNotesBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCmqm0mhA4wWwfxigPsVUf-SceZ1KufPu4&libraries=places"></script>
    <script src="app.js"></script>
</body>
</html>
